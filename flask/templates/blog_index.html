<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Articles — Formation Flask</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main>
        <h1>Articles</h1>
        <p>Liste des articles — chaque lien illustre une URL RESTful avec slug.</p>
        <ul>
            {% for a in articles %}
            <li><a href="{{ url_for('article', slug=a.slug) }}">/articles/{{ a.slug }} — {{ a.titre }}</a></li>
            {% endfor %}
        </ul>
        <nav>
            <a href="{{ url_for('index') }}">← Retour à l'accueil</a>
        </nav>
    </main>
</body>
</html>
